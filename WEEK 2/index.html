<!DOCTYPE html>

    <title>Pricing Table</title>
</head>
<body>

        <tr>
            <td>Price</td>

        <tr>

            <td>10GB</td>

        <tr>
            <td>Support</td>
            <td>Email</td>
            <td>Chat</td>
            <td>24/7 Support</td>
        </tr>
    </table>

</body>
