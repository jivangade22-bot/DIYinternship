<!DOCTYPE html>
<html>
<head>
    <title>Pricing Table</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="card">
        <h2>Basic</h2>
        <h1>₹499</h1>
        <p>1 Website</p>
        <p>5 GB Storage</p>
        <button>Select</button>
    </div>

    <div class="card">
        <h2>Standard</h2>
        <h1>₹999</h1>
        <p>5 Websites</p>
        <p>20 GB Storage</p>
        <button>Select</button>
    </div>

    <div class="card">
        <h2>Premium</h2>
        <h1>₹1499</h1>
        <p>Unlimited Websites</p>
        <p>50 GB Storage</p>
        <button>Select</button>
    </div>

</div>

</body>
</html>
