<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Table</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <div class="card">
            <h2>Basic</h2>
            <h1>$9</h1>
            <p>/month</p>

            <ul>
                <li>1 Website</li>
                <li>10 GB Storage</li>
                <li>Email Support</li>
            </ul>

            <button>Select Plan</button>
        </div>

        <div class="card featured">
            <h2>Standard</h2>
            <h1>$19</h1>
            <p>/month</p>

            <ul>
                <li>5 Websites</li>
                <li>50 GB Storage</li>
                <li>Priority Support</li>
            </ul>

            <button>Select Plan</button>
        </div>

        <div class="card">
            <h2>Premium</h2>
            <h1>$29</h1>
            <p>/month</p>

            <ul>
                <li>Unlimited Websites</li>
                <li>100 GB Storage</li>
                <li>24/7 Support</li>
            </ul>

            <button>Select Plan</button>
        </div>

    </div>

</body>
</html>
